<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasabi File Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .refresh-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, background 0.2s;
        }

        .refresh-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .file-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            word-break: break-all;
            font-size: 14px;
        }

        .file-meta {
            color: #666;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☁️ Wasabi File Manager</h1>
            <div class="subtitle">Manage your files stored in Wasabi S3 compatible storage</div>
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-label">Total Files</div>
                    <div class="stat-value" id="fileCount">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Size</div>
                    <div class="stat-value" id="totalSize">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Bucket</div>
                    <div class="stat-value" id="bucketName">-</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="Search files...">
            <button class="refresh-btn" onclick="loadFiles()">🔄 Refresh</button>
        </div>

        <div id="fileList" class="file-grid"></div>
    </div>

    <!-- Link Generation Modal -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">🔗 Generate Download Link</div>
            <div class="modal-body">
                <p>File: <strong id="modalFileName"></strong></p>
                <label>Expires in (seconds):</label>
                <input type="number" id="expiresIn" value="604800">
                <small>Default: 604800 seconds (7 days)</small>
                <div id="generatedLink" style="margin-top: 20px; display: none;">
                    <label>Download Link:</label>
                    <input type="text" id="downloadLink" readonly onclick="this.select()">
                </div>
            </div>
            <div class="file-actions">
                <button class="btn btn-primary" onclick="generateLink()">Generate Link</button>
                <button class="btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentFileKey = null;

        async function loadFiles() {
            const fileListDiv = document.getElementById('fileList');
            fileListDiv.innerHTML = '<div class="loading"><div class="spinner"></div> Loading files...</div>';
            
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                displayFiles(data.files);
                loadStats();
            } catch (error) {
                fileListDiv.innerHTML = `<div class="error">❌ Error loading files: ${error.message}</div>`;
            }
        }

        function displayFiles(files) {
            const fileListDiv = document.getElementById('fileList');
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            const filteredFiles = files.filter(file => 
                file.filename.toLowerCase().includes(searchTerm)
            );
            
            if (filteredFiles.length === 0) {
                fileListDiv.innerHTML = '<div class="loading">📂 No files found</div>';
                return;
            }
            
            fileListDiv.innerHTML = filteredFiles.map(file => `
                <div class="file-card">
                    <div class="file-icon">${getFileIcon(file.filename)}</div>
                    <div class="file-name" title="${file.key}">${file.filename}</div>
                    <div class="file-meta">
                        Size: ${file.size_human}<br>
                        Modified: ${new Date(file.last_modified).toLocaleString()}
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-primary" onclick="showLinkModal('${file.key}', '${file.filename}')">🔗 Get Link</button>
                        <button class="btn btn-danger" onclick="deleteFile('${file.key}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📄', 'doc': '📝', 'docx': '📝',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'mp4': '🎥', 'mkv': '🎥', 'avi': '🎥',
                'mp3': '🎵', 'wav': '🎵',
                'zip': '📦', 'rar': '📦', '7z': '📦',
                'txt': '📃', 'md': '📃'
            };
            return icons[ext] || '📁';
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/bucket-info');
                const data = await response.json();
                
                document.getElementById('fileCount').textContent = data.file_count || 0;
                document.getElementById('totalSize').textContent = data.total_size_human || '0 B';
                document.getElementById('bucketName').textContent = data.bucket_name;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function showLinkModal(key, filename) {
            currentFileKey = key;
            document.getElementById('modalFileName').textContent = filename;
            document.getElementById('generatedLink').style.display = 'none';
            document.getElementById('expiresIn').value = 604800;
            document.getElementById('linkModal').style.display = 'flex';
        }

        async function generateLink() {
            const expiresIn = document.getElementById('expiresIn').value;
            const generateBtn = event.target;
            const originalText = generateBtn.textContent;
            
            generateBtn.textContent = '⏳ Generating...';
            generateBtn.disabled = true;
            
            try {
                const response = await fetch('/api/generate-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: currentFileKey, expires_in: parseInt(expiresIn) })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                document.getElementById('downloadLink').value = data.url;
                document.getElementById('generatedLink').style.display = 'block';
            } catch (error) {
                alert('Error generating link: ' + error.message);
            } finally {
                generateBtn.textContent = originalText;
                generateBtn.disabled = false;
            }
        }

        async function deleteFile(key) {
            if (!confirm('Are you sure you want to delete this file? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch('/api/delete-file', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: key })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                alert('✅ File deleted successfully');
                loadFiles();
            } catch (error) {
                alert('Error deleting file: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('linkModal').style.display = 'none';
            currentFileKey = null;
        }

        // Search with debounce
        let searchTimeout;
        document.getElementById('searchBox').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadFiles(), 300);
        });

        // Load files on page load
        loadFiles();
        
        // Auto-refresh every 30 seconds
        setInterval(loadFiles, 30000);
    </script>
</body>
</html>
